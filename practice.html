<style>
    body{
        background-color: black;
        color: white;
        font-family: "Poppins", sans-serif;

    }
     button{
        height: 50px;
        width: 160px;
        border: 2px solid rgb(255, 255, 255);
        position: relative;
        top: 0;
        left: 50%;
        border-radius: 12px;
        font-size: 21px;
        font-weight: 600;
        cursor:pointer;
        color:#0ea5e9; 
        transition: all .5s ease-out;
        opacity: 80%;
    }
    button:hover{
         box-shadow: 2px 1px 20px 7px #0ea5e9;
        background-color:#0ea5e9 ;
        color: white;
        transform:translateY(-2px) ;
        opacity: 100%;
    }
     span{
        
        animation:change 6s infinite;
    }  

    h1:nth-child(1){ animation-delay: 2s;}
    h1:nth-child(2){ animation-delay: 4s;}


@keyframes change {
    0%{
        opacity: 0;
        transform: translateY(-30px);
    }
    10%,25%{
        opacity: 1;
        transform: translateY(0);
    }
    50%{
        transform: translateY(-30px);
        opacity: 0;

    }
    100%{
        opacity: 1;
        
    }
}




    @keyframes blink{
        0%{
            opacity: 1;
            transform: translateX(-5px);
        }
        50%{
            opacity: 0;
        }
        100%{
            opacity: 1;
        }
    }

    @keyframes wrap{
        0%{
            transform: translateX(-5px);
        }
        50%{
            opacity: 0;
        }
        100%{
            opacity: 1;
        }
    }
</style>
<body>
  

<br><br>

    <button  class="">Learn More</button>
    <button  class="">Download CV</button>

    <h1> i am pankaj 
        <span id="web">Web Developer</span>
        <span id="you">Youtube</span>
        <div>

            <span>|</span></h1>
        </div>
</body>
</html>
